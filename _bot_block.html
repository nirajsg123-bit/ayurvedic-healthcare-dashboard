
<!-- ============ AYURVEDA ASSISTANT BOT ============ -->
<div id="bot-launcher" onclick="toggleBot()" title="Ayurveda Assistant">🤖<span class="bot-pulse"></span></div>
<div id="bot-panel" class="hidden">
  <div id="bot-header">
    <div class="bot-avatar">🕉️</div>
    <div>
      <div class="bot-title">Ayurveda Assistant</div>
      <div class="bot-sub">Ask about doctors, herbs, conditions, yoga</div>
    </div>
    <button class="bot-close" onclick="toggleBot()">×</button>
  </div>
  <div id="bot-messages"></div>
  <div id="bot-chips"></div>
  <div id="bot-input-row">
    <input id="bot-input" type="text" placeholder="Type your question…" onkeydown="if(event.key==='Enter')botSend()" />
    <button class="bot-send" onclick="botSend()">➤</button>
  </div>
</div>
<style>
  #bot-launcher{position:fixed;right:22px;bottom:22px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#2f9e8f,#16a34a);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 20px rgba(47,158,143,.5);z-index:9998;transition:transform .2s;}
  #bot-launcher:hover{transform:scale(1.08);}
  .bot-pulse{position:absolute;inset:0;border-radius:50%;border:2px solid #2f9e8f;animation:botpulse 2s infinite;}
  @keyframes botpulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.5);opacity:0}}
  #bot-panel{position:fixed;right:22px;bottom:96px;width:380px;max-width:92vw;height:560px;max-height:82vh;background:var(--surface,#fff);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.25);z-index:9999;display:flex;flex-direction:column;overflow:hidden;border:1px solid rgba(47,158,143,.25);}
  #bot-panel.hidden{display:none;}
  #bot-header{display:flex;align-items:center;gap:10px;padding:14px 16px;background:linear-gradient(135deg,#2f9e8f,#16a34a);color:#fff;}
  .bot-avatar{font-size:26px;}
  .bot-title{font-weight:700;font-size:15px;}
  .bot-sub{font-size:11px;opacity:.85;}
  .bot-close{margin-left:auto;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;width:30px;height:30px;border-radius:8px;cursor:pointer;}
  #bot-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--bg,#f7faf9);}
  .bot-msg{max-width:88%;padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.5;white-space:pre-wrap;}
  .bot-msg.bot{background:var(--surface,#fff);align-self:flex-start;border:1px solid #e5e7eb;}
  .bot-msg.user{background:#2f9e8f;color:#fff;align-self:flex-end;}
  .bot-msg a{color:#2563eb;font-weight:600;}
  .bot-card{background:var(--surface,#fff);border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-top:6px;}
  .bot-card h4{margin:0 0 6px;color:#2f9e8f;font-size:14px;}
  .bot-card .row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px dashed #eee;}
  .bot-card .row:last-child{border:none;}
  .bot-mini{display:inline-block;background:#eafaf6;color:#2f9e8f;border-radius:6px;padding:2px 8px;font-size:11px;margin:2px;}
  #bot-chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;background:var(--surface,#fff);border-top:1px solid #eee;}
  .bot-chip{background:#f0fdf9;color:#2f9e8f;border:1px solid #b8e6dc;border-radius:14px;padding:5px 11px;font-size:12px;cursor:pointer;transition:.15s;}
  .bot-chip:hover{background:#2f9e8f;color:#fff;}
  #bot-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #eee;background:var(--surface,#fff);}
  #bot-input{flex:1;border:1px solid #d1d5db;border-radius:10px;padding:9px 12px;font-size:13px;outline:none;}
  #bot-input:focus{border-color:#2f9e8f;}
  .bot-send{background:#2f9e8f;color:#fff;border:none;border-radius:10px;width:42px;cursor:pointer;font-size:16px;}
  .bot-typing{font-style:italic;color:#888;}
</style>
<script>
// ---------- AYURVEDA ASSISTANT (client-side bot over local APIs) ----------
var botOpen=false;
function toggleBot(){ botOpen=!botOpen; document.getElementById('bot-panel').classList.toggle('hidden',!botOpen); if(botOpen && !document.getElementById('bot-messages').innerHTML){ botGreeting(); } }
function botGreeting(){
  botAdd('bot','🙏 Namaste! I am your Ayurveda Assistant. I can help you find doctors, herbs, therapies, yoga practices, and health conditions from the dashboard data.');
  renderChips([
    {label:'🩺 Find a doctor',q:'Find me an Ayurvedic doctor'},
    {label:'🌿 Herbs for diabetes',q:'Which herbs help with diabetes?'},
    {label:'🧘 Yoga for back pain',q:'What yoga helps back pain?'},
    {label:'📅 Book appointment',action:'book'},
    {label:'🏥 Hospitals in Kerala',q:'List hospitals in Kerala'}
  ]);
}
function renderChips(chips){ var box=document.getElementById('bot-chips'); box.innerHTML=''; chips.forEach(function(c){ var b=document.createElement('button'); b.className='bot-chip'; b.textContent=c.label; b.onclick=function(){ if(c.action==='book'){ toggleBot(); showBookAppointmentModal(); } else { botSend(c.q); } }; box.appendChild(b); }); }
function botAdd(who,html){ var m=document.createElement('div'); m.className='bot-msg '+who; m.innerHTML=html; document.getElementById('bot-messages').appendChild(m); document.getElementById('bot-messages').scrollTop=document.getElementById('bot-messages').scrollHeight; }
function botSend(preset){
  var input=document.getElementById('bot-input'); var text=preset||input.value.trim(); if(!text) return; input.value='';
  botAdd('user',escapeHtml(text));
  document.getElementById('bot-chips').innerHTML='';
  var t=document.createElement('div'); t.className='bot-msg bot bot-typing'; t.textContent='Thinking…'; document.getElementById('bot-messages').appendChild(t);
  handleBot(text).then(function(reply){ t.remove(); botAdd('bot',reply); renderChips([{label:'🔄 New question',action:'reset'},{label:'📅 Book',action:'book'}]); }).catch(function(e){ t.remove(); botAdd('bot','⚠️ Sorry, I had trouble with that. '+(e.message||'')); });
}
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
async function apiGet(url){ var r=await fetch(url); if(!r.ok) throw new Error('no data'); return r.json(); }
function intentOf(text){
  var t=text.toLowerCase();
  if(t.match(/\b(book|appointment|schedule|consult)\b/)) return 'book';
  if(t.match(/\b(hospital|clinic)\b/)) return 'hospital';
  if(t.match(/\b(yoga|asana|pranayama|meditat)\b/)) return 'yoga';
  if(t.match(/\b(therap|panchakarma|abhyanga|basti|virechan)\b/)) return 'therapy';
  if(t.match(/\b(herb|plant|medicine|remedy|dosha|rasayana)\b/)) return 'herb';
  if(t.match(/\b(doctor|physician|specialist|ayurved|physio|cardio|neuro)\b/)) return 'doctor';
  if(t.match(/\b(condition|disease|symptom|diabetes|arthritis|pcos|anxiety|acne|cough|fever|obesity)\b/)) return 'condition';
  return 'search';
}
function stateIn(text){ var states=['andhra pradesh','arunachal pradesh','assam','bihar','chhattisgarh','delhi','goa','gujarat','haryana','himachal pradesh','jammu and kashmir','jharkhand','karnataka','kerala','madhya pradesh','maharashtra','manipur','meghalaya','mizoram','nagaland','odisha','punjab','rajasthan','sikkim','tamil nadu','telangana','tripura','uttar pradesh','uttarakhand','west bengal']; for(var i=0;i<states.length;i++){ if(text.toLowerCase().indexOf(states[i])>=0) return states[i].replace(/\b\w/g,function(c){return c.toUpperCase();}); } return null; }
async function handleBot(text){
  var intent=intentOf(text); var st=stateIn(text);
  if(intent==='book'){ return 'I can help you book an appointment. Opening the booking form — just pick a doctor, hospital, date and time. 📅'; }
  if(intent==='doctor'){
    var url='/api/doctors?ayurvedicOnly=true&limit=5&sortBy=rating&sortDir=desc'+(st?('&state='+encodeURIComponent(st)):'');
    var d=await apiGet(url); if(!d.data.length) return 'I couldn’t find a doctor matching that. Try “Find an Ayurvedic doctor in Kerala”.';
    var html='Here are '+(st?('top Ayurvedic doctors in '+st):'top-rated Ayurvedic doctors')+':\n';
    d.data.forEach(function(x){ html+='\n• <b>'+x.name+'</b> — '+x.specialty+' ('+x.city+', '+x.state+')\n  ★ '+x.rating+' • ₹'+x.consultationFee+'\n  <a href="#" onclick="showDetail(\'doctor\',\''+x.id+'\');return false;">View profile</a>'; });
    return html;
  }
  if(intent==='hospital'){
    var url2='/api/hospitals?limit=5'+(st?('&state='+encodeURIComponent(st)):'');
    var h=await apiGet(url2); if(!h.data.length) return 'No hospitals found for that. Try “hospitals in Maharashtra”.';
    var html2='Hospitals'+(st?(' in '+st):'')+':\n';
    h.data.forEach(function(x){ html2+='\n• <b>'+x.name+'</b> — '+x.type+', '+x.city+'\n  ₹'+x.totalBeds+' beds • ★ '+x.rating+'\n  <a href="#" onclick="showDetail(\'hospital\',\''+x.id+'\');return false;">View profile</a>'; });
    return html2;
  }
  if(intent==='herb'){
    var url3='/api/herbs?limit=6'; var term=text.replace(/[^a-z ]/gi,'').split(' ').filter(function(w){return w.length>3;}).slice(0,3).join(' ');
    if(term) url3+='&q='+encodeURIComponent(term);
    var hb=await apiGet(url3); if(!hb.data.length) return 'I couldn’t match an herb. Try “herbs for diabetes” or “Ashwagandha”.';
    var html3='Relevant herbs:\n';
    hb.data.forEach(function(x){ html3+='\n• <b>'+x.name+'</b> ('+x.sanskrit+') — '+x.category+'\n  Uses: '+(x.primaryUses||[]).slice(0,3).join(', ')+'\n  <a href="#" onclick="showDetail(\'herb\',\''+x.id+'\');return false;">Full profile</a>'; });
    return html3;
  }
  if(intent==='yoga'){
    var url4='/api/yoga?limit=6'; var yt=text.replace(/[^a-z ]/gi,'').split(' ').filter(function(w){return w.length>3;}).slice(0,3).join(' ');
    if(yt) url4+='&q='+encodeURIComponent(yt);
    var y=await apiGet(url4); if(!y.data.length) return 'No yoga practice matched. Try “yoga for back pain” or “Pranayama”.';
    var html4='Yoga & meditation practices:\n';
    y.data.forEach(function(x){ html4+='\n• <b>'+x.name+'</b> ('+x.english+') — '+x.difficulty+'\n  Benefits: '+(x.benefits||[]).slice(0,3).join(', ')+'\n  <a href="#" onclick="showDetail(\'yoga\',\''+x.id+'\');return false;">Guide</a>'; });
    return html4;
  }
  if(intent==='therapy'){
    var url5='/api/therapies?limit=6'; var tt=text.replace(/[^a-z ]/gi,'').split(' ').filter(function(w){return w.length>3;}).slice(0,3).join(' ');
    if(tt) url5+='&q='+encodeURIComponent(tt);
    var th=await apiGet(url5); if(!th.data.length) return 'No therapy matched. Try “Panchakarma” or “Abhyanga”.';
    var html5='Ayurvedic therapies:\n';
    th.data.forEach(function(x){ html5+='\n• <b>'+x.name+'</b> — '+x.category+'\n  '+(x.indications||[]).slice(0,3).join(', ')+'\n  <a href="#" onclick="showDetail(\'therapy\',\''+x.id+'\');return false;">Procedure</a>'; });
    return html5;
  }
  if(intent==='condition'){
    var url6='/api/health-benefits?limit=5'; var ct=text.replace(/[^a-z ]/gi,'').split(' ').filter(function(w){return w.length>3;}).slice(0,3).join(' ');
    if(ct) url6+='&q='+encodeURIComponent(ct);
    var c=await apiGet(url6); if(!c.data.length) return 'I couldn’t find that condition. Try “diabetes”, “arthritis”, or “PCOS”.';
    var html6='Conditions & Ayurvedic management:\n';
    c.data.forEach(function(x){ html6+='\n• <b>'+x.name+'</b> — '+(x.ayurvedicName||'')+'\n  Dosha: '+(x.doshaImbalance||'—')+'\n  Herbs: '+(x.herbs||[]).slice(0,3).join(', ')+'\n  <a href="#" onclick="showDetail(\'condition\',\''+encodeURIComponent((x.ayurvedicName||x.name).split('(')[0].trim().toLowerCase())+'\');return false;">Full guide</a>'; });
    return html6;
  }
  // fallback: global search
  var s=await apiGet('/api/search?q='+encodeURIComponent(text)+'&limit=5');
  if(s.results && s.results.length){ var html7='Here’s what I found across the dashboard:\n'; s.results.forEach(function(r){ html7+='\n• <b>'+r.name+'</b> ['+r.type+'] — '+r.subtitle+'\n  <a href="#" onclick="showDetail(\''+r.type+'\',\''+r.id+'\');return false;">Open</a>'; }); return html7; }
  return 'I’m not sure about that yet. Try asking about doctors, herbs, conditions, yoga, therapies, or hospitals — or tap a suggestion below.';
}
// reset chip
document.addEventListener('click',function(e){ if(e.target && e.target.classList && e.target.classList.contains('bot-chip') && e.target.textContent==='🔄 New question'){ renderChips([{label:'🩺 Find a doctor',q:'Find me an Ayurvedic doctor'},{label:'🌿 Herbs for diabetes',q:'Which herbs help with diabetes?'},{label:'🧘 Yoga for back pain',q:'What yoga helps back pain?'},{label:'📅 Book appointment',action:'book'}]); } });
